<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 | 页面未找到</title>
  <meta name="robots" content="noindex">
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 20% 20%, #1a1a24, #0a0a0f 50%);
      color: #e8e6e3;
      font-family: "Noto Serif SC", serif;
      padding: 24px;
    }
    .card {
      width: min(560px, 100%);
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(18,18,26,0.88);
      backdrop-filter: blur(6px);
      border-radius: 10px;
      padding: 28px;
    }
    h1 { margin: 0 0 8px; font-size: 2rem; font-weight: 600; }
    p { margin: 0 0 18px; color: #b4b4c2; line-height: 1.8; }
    a {
      display: inline-block;
      text-decoration: none;
      color: #0a0a0f;
      background: #c8a882;
      padding: 10px 16px;
      border-radius: 6px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>404</h1>
    <p>你访问的页面不存在，可能已被移动或删除。</p>
    <a href="/">返回首页</a>
  </main>
</body>
</html>
